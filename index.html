<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Send Node — Learn Binary Search Trees</title>
  <meta name="description" content="Master Binary Search Trees with interactive visualization and coding challenges." />
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
<div class="auth-page">
  <div class="auth-container">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <a class="logo" href="#">
          <div class="logo-icon">SN</div>
          Send <span>Node</span>
        </a>
      </div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
        <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Create Account</button>
      </div>

      <!-- Error banner -->
      <div class="auth-error" id="auth-error"></div>

      <!-- Login Form -->
      <form class="auth-form" id="login-form" onsubmit="handleLogin(event)">
        <div class="input-group">
          <label for="login-email">Email</label>
          <input class="input" id="login-email" type="email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="input-group">
          <label for="login-password">Password</label>
          <input class="input" id="login-password" type="password" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary auth-submit" id="login-btn">Sign In</button>
      </form>

      <!-- Register Form -->
      <form class="auth-form" id="register-form" style="display:none" onsubmit="handleRegister(event)">
        <div class="input-group">
          <label for="reg-username">Username</label>
          <input class="input" id="reg-username" type="text" placeholder="coderName123" required />
        </div>
        <div class="input-group">
          <label for="reg-email">Email</label>
          <input class="input" id="reg-email" type="email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="input-group">
          <label for="reg-password">Password</label>
          <input class="input" id="reg-password" type="password" placeholder="Min 6 characters" required minlength="6" autocomplete="new-password" />
        </div>
        <button type="submit" class="btn btn-primary auth-submit" id="register-btn">Create Account</button>
      </form>

      <!-- Features -->
      <div class="auth-features">
        <div class="auth-feature">
          <div class="auth-feature-icon">01</div>
          <span>Interactive BST Visualizer with pan & zoom</span>
        </div>
        <div class="auth-feature">
          <div class="auth-feature-icon">02</div>
          <span>14 BST coding challenges from Easy to Hard</span>
        </div>
        <div class="auth-feature">
          <div class="auth-feature-icon">03</div>
          <span>Track your progress and solved problems</span>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Firebase SDKs & Auth Logic -->
<script type="module" src="js/auth.js"></script>

</body>
</html>
