<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Challenge — Send Node</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/challenge.css" />
</head>
<body>
<div class="challenge-page">

  <!-- Navbar -->
  <nav class="chal-navbar">
    <a class="logo" href="dashboard.html">
      <div class="logo-icon">SN</div>
      Send <span>Node</span>
    </a>
    <span class="chal-prob-title" id="nav-prob-title">Challenge Mode</span>
    <a class="btn btn-ghost" href="explorer.html" style="font-size:12px;padding:6px 14px;">Explorer</a>
    <button class="btn btn-ghost" style="font-size:12px;padding:6px 14px;" onclick="handleLogout()">Sign Out</button>
  </nav>

  <!-- Body -->
  <div class="chal-body">

    <!-- Sidebar: problem list -->
    <div class="chal-sidebar" id="chal-sidebar">
      <div class="sidebar-head">Problems</div>
      <!-- Populated by JS -->
    </div>

    <!-- Description panel -->
    <div class="chal-desc">
      <div class="desc-header">
        <div class="desc-title" id="desc-title">Select a Problem</div>
        <div class="desc-meta">
          <span class="badge" id="desc-badge"></span>
          <span id="desc-status" style="font-size:13px;"></span>
        </div>
      </div>
      <div class="desc-body" id="desc-body">
        <p style="color:var(--text-muted)">Select a problem from the sidebar to begin.</p>
      </div>
      <div class="hints-section" id="hints-section" style="display:none">
        <button class="hints-toggle" onclick="toggleHints()">Show Hints</button>
        <div class="hints-list" id="hints-list"></div>
      </div>
    </div>

    <!-- IDE panel -->
    <div class="chal-ide">

      <!-- IDE toolbar -->
      <div class="ide-toolbar">
        <span class="ide-lang-badge">Java (pseudo)</span>
        <div class="ide-spacer"></div>
        <button class="btn btn-ghost btn-icon" onclick="resetIde()">Reset</button>
        <button class="btn btn-blue"    onclick="runCode(false)">Run</button>
        <button class="btn btn-success" onclick="runCode(true)">Submit</button>
      </div>

      <!-- Split: editor + mini visualizer -->
      <div class="ide-split">

        <!-- Editor -->
        <div class="ide-editor-wrap">
          <textarea id="chal-code" spellcheck="false">// Select a problem from the sidebar to start.</textarea>
        </div>

        <!-- Mini BST Visualizer -->
        <div class="ide-viz-wrap">
          <div class="ide-viz-label">Live Tree Preview</div>
          <canvas id="chal-canvas"></canvas>
        </div>

      </div>

      <!-- Console -->
      <div class="ide-console">
        <div class="console-header">
          <span class="console-title">Console</span>
        </div>
        <textarea id="chal-console" readonly placeholder="// Run your code to see output..."></textarea>
        <div class="result-banner" id="result-banner"></div>
      </div>

    </div>
  </div>

</div>

<script src="js/bst.js"></script>
<script src="js/visualizer.js"></script>
<script src="js/problems.js"></script>
<script src="js/challenge.js"></script>

<script type="module">
  import { auth, db } from "./js/firebase-config.js";
  import { onAuthStateChanged, signOut }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { doc, getDoc, updateDoc, arrayUnion }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  let currentUser = null;
  let solvedProblems = [];

  onAuthStateChanged(auth, async user => {
    if (!user) { window.location.href = 'index.html'; return; }
    currentUser = user;
    try {
      const snap = await getDoc(doc(db, 'users', user.uid));
      if (snap.exists()) solvedProblems = snap.data().solvedProblems || [];
    } catch(e) {}
    window.initChallengePage(solvedProblems);

    const params = new URLSearchParams(window.location.search);
    const pid = parseInt(params.get('p'));
    if (pid && pid >= 1 && pid <= 14) window.loadProblem(pid);
  });

  window.handleLogout = async () => { await signOut(auth); window.location.href = 'index.html'; };

  window.markSolved = async function(problemId) {
    if (!currentUser || solvedProblems.includes(problemId)) return;
    solvedProblems.push(problemId);
    try {
      await updateDoc(doc(db, 'users', currentUser.uid), {
        solvedProblems: arrayUnion(problemId)
      });
      const el = document.getElementById(`prob-check-${problemId}`);
      if (el) el.textContent = 'Solved';
    } catch(e) {}
  };
</script>
</body>
</html>
